<!DOCTYPE html>
<html>

<head>
    <title>Example Animation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <script type='text/javascript'>
        window.addEventListener("load", function (event) {
            const ball = {
                x: 0, y: 0,
                xSpeed: 2, ySpeed: 1,
                radius: 50,
                red: 0
            };
            let timerId;

            function startAnimation() {
                timerId = setInterval(updateAnimation, 16);
            }

            function stopAnimation() {
                clearTimeout(timerId);
            }

            function updateAnimation() {
                ball.x = ball.x + ball.xSpeed;
                ball.y = ball.y + ball.ySpeed;
                if (ball.radius > 1) {
                    ball.radius = ball.radius - 0.2;
                }
                if (ball.red < 255) {
                    ball.red = ball.red + 1;
                }

                const e = document.getElementById("movingBall");
                e.style.left = ball.x + "px";
                e.style.top = ball.y + "px";
                e.style.width = ball.radius * 2 + "px";
                e.style.height = ball.radius * 2 + "px";
                e.style.borderRadius = ball.radius * 2 + "px";
                e.style.backgroundColor = "rgb(" + ball.red + ",0,0)";

                if (ball.x >= window.innerWidth || ball.y >= window.innerHeight) {
                    stopAnimation();
                }
            }

            startAnimation();
        });
    </script>
    <style>
        #movingBall {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 200px;
            background-color: black;
            top: 0px;
            left: 0px;
            color: silver;
            display: flex;
            align-items: center;
        }

        p {
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body style='text-align:center;'>
    <div id="movingBall">
        <p>I'm a ball!</p>
    </div>
</body>

</html>
