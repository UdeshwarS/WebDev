<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Cootes Coders Intro</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f1f8f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background-color: #f1f8f3;
        }
    </style>
</head>
<body>
    <canvas id="introCanvas" width="1366" height="768"></canvas>

    <script>
        const canvas = document.getElementById("introCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        class Particle {
            constructor(x, y, radius, speedX, speedY, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.speedX = speedX;
                this.speedY = speedY;
                this.color = color;
            }

            move() {
                this.x = this.x + this.speedX;
                this.y = this.y + this.speedY;

                if (this.x < -20) {
                    this.x = canvas.width + 20;
                }
                if (this.x > canvas.width + 20) {
                    this.x = -20;
                }
                if (this.y < -20) {
                    this.y = canvas.height + 20;
                }
                if (this.y > canvas.height + 20) {
                    this.y = -20;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        class SlidingText {
            constructor(text, x, y, speed, color, font, stopX) {
                this.text = text;
                this.x = x;
                this.y = y;
                this.speed = speed;
                this.color = color;
                this.font = font;
                this.stopX = stopX;
            }

            move() {
                if (this.speed > 0 && this.x < this.stopX) {
                    this.x = this.x + this.speed;
                    if (this.x > this.stopX) {
                        this.x = this.stopX;
                    }
                } else if (this.speed < 0 && this.x > this.stopX) {
                    this.x = this.x + this.speed;
                    if (this.x < this.stopX) {
                        this.x = this.stopX;
                    }
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.font = this.font;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        const particles = [];
        let i;

        for (i = 0; i < 35; i++) {
            particles.push(
                new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() * 3 + 1,
                    Math.random() * 0.6 - 0.3,
                    Math.random() * 0.6 - 0.3,
                    "rgba(28, 58, 75, 0.12)"
                )
            );
        }

        let titleText;
        let sloganText;

        function createTextObjects() {
            titleText = new SlidingText(
                "Cootes Coders",
                -300,
                canvas.height / 2 - 30,
                6,
                "#1C3A4B",
                "bold 80px Segoe UI",
                canvas.width / 2
            );

            sloganText = new SlidingText(
                "Code. Learn. Ship.",
                canvas.width + 300,
                canvas.height / 2 + 45,
                -5,
                "#1C3A4B",
                "bold 30px Segoe UI",
                canvas.width / 2
            );
        }

        createTextObjects();
        window.addEventListener("resize", createTextObjects);

        function drawBackground() {
            ctx.fillStyle = "#f1f8f3";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawAccentLine() {
            const lineWidth = 420;
            const x1 = canvas.width / 2 - lineWidth / 2;
            const x2 = canvas.width / 2 + lineWidth / 2;
            const y = canvas.height / 2 + 90;

            ctx.beginPath();
            ctx.moveTo(x1, y);
            ctx.lineTo(x2, y);
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#1C3A4B";
            ctx.stroke();
        }

        function animate() {
            drawBackground();

            for (i = 0; i < particles.length; i++) {
                particles[i].move();
                particles[i].draw();
            }

            titleText.move();
            titleText.draw();

            sloganText.move();
            sloganText.draw();

            drawAccentLine();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
