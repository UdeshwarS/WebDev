<!DOCTYPE html>
<html>

<head>
    <title>Canvas Test Bed</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <style type="text/css">
        #testCanvas {
            background-color: silver;
            margin: 30px;
        }

        body {
            text-align: center;
            color: silver;
            background-color: rgb(53, 66, 29);
        }
    </style>
    <script>
        window.addEventListener("load", function () {
            const canvas = document.getElementById("testCanvas");
            const ctx = canvas.getContext("2d");
            const buttons = document.querySelectorAll("input[type=button]");

            let nextHouseX = 20;
            let lastHouseX = -1;

            function drawNightBackground() {
                ctx.fillStyle = "midnightblue";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "darkgreen";
                ctx.fillRect(0, 300, canvas.width, 100);
            }

            function drawHouse() {
                const x = nextHouseX;
                const y = 220;

                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;

                ctx.strokeRect(x, y, 60, 60);
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + 30, y - 35);
                ctx.lineTo(x + 60, y);
                ctx.stroke();

                ctx.strokeRect(x + 22, y + 30, 16, 30);
                ctx.strokeRect(x + 8, y + 12, 12, 12);
                ctx.strokeRect(x + 40, y + 12, 12, 12);

                lastHouseX = x;
                nextHouseX = nextHouseX + 80;
            }

            function drawCar() {
                if (lastHouseX === -1) {
                    return;
                }

                const x = lastHouseX;
                const y = 320;

                ctx.strokeStyle = "yellow";
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(x + 5, y);
                ctx.lineTo(x + 15, y - 20);
                ctx.lineTo(x + 45, y - 20);
                ctx.lineTo(x + 58, y);
                ctx.lineTo(x + 5, y);
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(x + 15, y, 8, 0, Math.PI * 2);
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(x + 48, y, 8, 0, Math.PI * 2);
                ctx.stroke();
            }

            function drawStar() {
                const x = Math.floor(Math.random() * canvas.width);
                const y = Math.floor(Math.random() * 180);
                const red = Math.floor(Math.random() * 256);
                const green = Math.floor(Math.random() * 256);
                const blue = Math.floor(Math.random() * 256);

                ctx.fillStyle = "rgb(" + red + "," + green + "," + blue + ")";
                ctx.beginPath();
                ctx.moveTo(x, y - 8);
                ctx.lineTo(x + 3, y - 3);
                ctx.lineTo(x + 8, y);
                ctx.lineTo(x + 3, y + 3);
                ctx.lineTo(x, y + 8);
                ctx.lineTo(x - 3, y + 3);
                ctx.lineTo(x - 8, y);
                ctx.lineTo(x - 3, y - 3);
                ctx.closePath();
                ctx.fill();
            }

            buttons[0].addEventListener("click", drawNightBackground);
            buttons[1].addEventListener("click", drawHouse);
            buttons[2].addEventListener("click", drawCar);
            buttons[3].addEventListener("click", drawStar);
        });

    </script>
</head>

<body>
    <h1>Canvas Test Bed 4</h1>
    <canvas id="testCanvas" width="400" height="400"></canvas>
    <br>
    <input type="button" value="Button 1">
    <input type="button" value="Button 2">
    <input type="button" value="Button 3">
    <input type="button" value="Button 4">
</body>

</html>
